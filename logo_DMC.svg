<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#2a0a0a"/>
      <stop offset="100%" stop-color="#0a0005"/>
    </radialGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f5e6a0"/>
      <stop offset="30%" stop-color="#c9a84c"/>
      <stop offset="70%" stop-color="#a07830"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="30%" stop-color="#8b1a1a"/>
      <stop offset="50%" stop-color="#c0392b"/>
      <stop offset="70%" stop-color="#8b1a1a"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <filter id="glowGold" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowRed" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="aura" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="25%" stop-color="#c9a84c"/>
      <stop offset="50%" stop-color="#f5e6a0"/>
      <stop offset="75%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bgGrad)"/>
  <ellipse cx="400" cy="210" rx="300" ry="160" fill="#5a0000" opacity="0.25" filter="url(#aura)"/>

  <!-- Top ornament -->
  <line x1="80" y1="75" x2="720" y2="75" stroke="url(#lineGrad)" stroke-width="1" opacity="0.6"/>
  <polygon points="400,63 408,71 400,79 392,71" fill="#c9a84c" opacity="0.8"/>
  <polygon points="400,65 406,71 400,77 394,71" fill="#f5e6a0"/>
  <polygon points="180,70 185,75 180,80 175,75" fill="#c9a84c" opacity="0.5"/>
  <polygon points="620,70 625,75 620,80 615,75" fill="#c9a84c" opacity="0.5"/>

  <!-- DMC besar -->
  <text x="400" y="185"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="130"
    font-weight="bold"
    text-anchor="middle"
    fill="url(#goldGrad)"
    filter="url(#glowGold)"
    letter-spacing="18">DMC</text>

  <!-- Garis merah -->
  <rect x="120" y="198" width="560" height="3" fill="url(#redGrad)" rx="2"/>
  <rect x="160" y="202" width="480" height="1" fill="url(#lineGrad)" opacity="0.5" rx="1"/>

  <!-- Decision Making Challenge -->
  <text x="400" y="240"
    font-family="Georgia, serif"
    font-size="22"
    text-anchor="middle"
    fill="#c0392b"
    filter="url(#glowRed)"
    letter-spacing="6">D E C I S I O N   M A K I N G   C H A L L E N G E</text>

  <!-- Garis tipis pemisah -->
  <line x1="200" y1="265" x2="600" y2="265" stroke="url(#lineGrad)" stroke-width="0.5" opacity="0.4"/>

  <!-- By Alif and Fajar -->
  <text x="400" y="300"
    font-family="Georgia, serif"
    font-size="16"
    text-anchor="middle"
    fill="#c9a84c"
    filter="url(#glowGold)"
    letter-spacing="4"
    opacity="0.9">✦  by Alif &amp; Fajar  ✦</text>

  <!-- Bottom ornament -->
  <line x1="80" y1="335" x2="720" y2="335" stroke="url(#lineGrad)" stroke-width="1" opacity="0.6"/>
  <polygon points="400,327 408,335 400,343 392,335" fill="#c9a84c" opacity="0.8"/>
  <polygon points="400,329 406,335 400,341 394,335" fill="#f5e6a0"/>
  <polygon points="180,330 185,335 180,340 175,335" fill="#c9a84c" opacity="0.5"/>
  <polygon points="620,330 625,335 620,340 615,335" fill="#c9a84c" opacity="0.5"/>

  <!-- Copyright -->
  <text x="400" y="390"
    font-family="Georgia, serif"
    font-size="11"
    text-anchor="middle"
    fill="#a08060"
    letter-spacing="3"
    opacity="0.7">OPSI DMC · 2026</text>
</svg>
